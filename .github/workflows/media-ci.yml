name: Media CI

on:
  push:
    paths:
      - "media_server.cpp"
      - "test_event_bus_multi_instance.ps1"
      - "test_auth.ps1"
      - "test_ws_jwt_tenant.ps1"
      - "test_auth_passkey.ps1"
      - "test_auth_passkey_persistence.ps1"
      - "test_auth_passkey_rate_limit.ps1"
      - "test_auth_passkey_lockout.ps1"
      - ".github/workflows/media-ci.yml"
  pull_request:
    paths:
      - "media_server.cpp"
      - "test_event_bus_multi_instance.ps1"
      - "test_auth.ps1"
      - "test_ws_jwt_tenant.ps1"
      - "test_auth_passkey.ps1"
      - "test_auth_passkey_persistence.ps1"
      - "test_auth_passkey_rate_limit.ps1"
      - "test_auth_passkey_lockout.ps1"
      - ".github/workflows/media-ci.yml"
  workflow_dispatch:

jobs:
  build-and-eventbus-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install websocket-client

      - name: Build media server
        run: |
          g++ -std=c++17 media_server.cpp -o media_server -O2 -pthread -ldl

      - name: Run multi-instance Redis propagation test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_A:-}" ]]; then kill "$PID_A" 2>/dev/null || true; fi
            if [[ -n "${PID_B:-}" ]]; then kill "$PID_B" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=redis
          export GIGACHAD_REDIS_HOST=127.0.0.1
          export GIGACHAD_REDIS_PORT=6379
          export GIGACHAD_EVENT_BUS_CHANNEL=gagabunto.media.ci.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=

          GIGACHAD_SERVER_PORT=18081 ./media_server >server_a.log 2>&1 &
          PID_A=$!
          GIGACHAD_SERVER_PORT=18082 ./media_server >server_b.log 2>&1 &
          PID_B=$!

          python - <<'PY'
          import json
          import time
          import urllib.request
          import urllib.error
          from websocket import create_connection, WebSocketTimeoutException

          def wait_health(port, timeout=25):
            end = time.time() + timeout
            url = f"http://127.0.0.1:{port}/api/health"
            last = None
            while time.time() < end:
              try:
                with urllib.request.urlopen(url, timeout=2) as r:
                  body = r.read().decode("utf-8")
                data = json.loads(body)
                last = data
                if data.get("status") == "healthy" and data.get("eventBusMode") == "redis" and data.get("eventBusRedisReady") is True:
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError(f"health timeout port={port} last={last}")

          wait_health(18081)
          wait_health(18082)

          room = "redis-room"
          marker = f"ci-marker-{int(time.time()*1000)}"

          ws = create_connection(f"ws://127.0.0.1:18082/ws?room={room}&user=ci-listener", timeout=5)
          ws.settimeout(5)
          try:
            try:
              ws.recv()
            except Exception:
              pass

            payload = json.dumps({"username":"ci", "content":marker, "roomId":room}).encode("utf-8")
            req = urllib.request.Request(
              "http://127.0.0.1:18081/api/chat/messages",
              data=payload,
              method="POST",
              headers={"Content-Type":"application/json"},
            )
            with urllib.request.urlopen(req, timeout=5) as r:
              if r.status not in (200, 201):
                raise RuntimeError(f"post failed status={r.status}")

            deadline = time.time() + 20
            while time.time() < deadline:
              try:
                frame = ws.recv()
              except WebSocketTimeoutException:
                continue
              if not frame:
                continue
              try:
                ev = json.loads(frame)
              except Exception:
                continue
              if ev.get("type") == "chat.message.created" and ev.get("roomId") == room:
                p = ev.get("payload") or {}
                if p.get("content") == marker:
                  print("PASS: cross-instance redis event propagation")
                  break
            else:
              raise RuntimeError("did not receive cross-instance chat.message.created")
          finally:
            ws.close()
          PY

      - name: Run multi-tenant isolation test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_A:-}" ]]; then kill "$PID_A" 2>/dev/null || true; fi
            if [[ -n "${PID_B:-}" ]]; then kill "$PID_B" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=redis
          export GIGACHAD_REDIS_HOST=127.0.0.1
          export GIGACHAD_REDIS_PORT=6379
          export GIGACHAD_EVENT_BUS_CHANNEL=gagabunto.media.ci.tenant.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=

          GIGACHAD_SERVER_PORT=18181 ./media_server >tenant_a.log 2>&1 &
          PID_A=$!
          GIGACHAD_SERVER_PORT=18182 ./media_server >tenant_b.log 2>&1 &
          PID_B=$!

          python - <<'PY'
          import json
          import time
          import urllib.request
          from websocket import create_connection, WebSocketTimeoutException

          def wait_health(port, timeout=25):
            end = time.time() + timeout
            url = f"http://127.0.0.1:{port}/api/health"
            while time.time() < end:
              try:
                with urllib.request.urlopen(url, timeout=2) as r:
                  data = json.loads(r.read().decode("utf-8"))
                if data.get("status") == "healthy" and data.get("eventBusMode") == "redis" and data.get("eventBusRedisReady") is True:
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError(f"health timeout on {port}")

          wait_health(18181)
          wait_health(18182)

          room = "tenant-room"
          tenant_a = "tenant-alpha"
          tenant_b = "tenant-beta"

          ws = create_connection(f"ws://127.0.0.1:18182/ws?room={room}&user=ci-tenant-listener&tenant={tenant_b}", timeout=5)
          ws.settimeout(1.5)
          try:
            try:
              ws.recv()
            except Exception:
              pass

            marker_a = f"tenantA-{int(time.time()*1000)}"
            body_a = json.dumps({"username":"ci","content":marker_a,"roomId":room,"tenantId":tenant_a}).encode("utf-8")
            req_a = urllib.request.Request(
              "http://127.0.0.1:18181/api/chat/messages",
              data=body_a,
              method="POST",
              headers={"Content-Type":"application/json"},
            )
            urllib.request.urlopen(req_a, timeout=5).read()

            unexpected = False
            end = time.time() + 5
            while time.time() < end:
              try:
                frame = ws.recv()
              except WebSocketTimeoutException:
                continue
              ev = json.loads(frame)
              if ev.get("type") == "chat.message.created" and (ev.get("payload") or {}).get("content") == marker_a:
                unexpected = True
                break
            if unexpected:
              raise RuntimeError("tenant isolation failed: different tenant event received")

            marker_b = f"tenantB-{int(time.time()*1000)}"
            body_b = json.dumps({"username":"ci","content":marker_b,"roomId":room,"tenantId":tenant_b}).encode("utf-8")
            req_b = urllib.request.Request(
              "http://127.0.0.1:18181/api/chat/messages",
              data=body_b,
              method="POST",
              headers={"Content-Type":"application/json"},
            )
            urllib.request.urlopen(req_b, timeout=5).read()

            received = False
            end = time.time() + 15
            while time.time() < end:
              try:
                frame = ws.recv()
              except WebSocketTimeoutException:
                continue
              ev = json.loads(frame)
              if ev.get("type") == "chat.message.created" and ev.get("tenantId") == tenant_b and (ev.get("payload") or {}).get("content") == marker_b:
                received = True
                break
            if not received:
              raise RuntimeError("tenant delivery failed: same tenant event missing")
            print("PASS: multi-tenant isolation test")
          finally:
            ws.close()
          PY

      - name: Run JWT auth and WS tenant-enforcement test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_JWT:-}" ]]; then kill "$PID_JWT" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=memory
          export GIGACHAD_JWT_SECRET=ci_jwt_secret_key
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=

          GIGACHAD_SERVER_PORT=18281 ./media_server >jwt_server.log 2>&1 &
          PID_JWT=$!

          python - <<'PY'
          import json
          import time
          import urllib.request
          from websocket import create_connection, WebSocketBadStatusException

          def wait_health(port, timeout=25):
            end = time.time() + timeout
            url = f"http://127.0.0.1:{port}/api/health"
            while time.time() < end:
              try:
                with urllib.request.urlopen(url, timeout=2) as r:
                  data = json.loads(r.read().decode("utf-8"))
                if data.get("status") == "healthy":
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError("jwt server health timeout")

          wait_health(18281)

          login_body = json.dumps({"username":"ci-auth","role":"user","tenantId":"tenant-alpha"}).encode("utf-8")
          login_req = urllib.request.Request(
            "http://127.0.0.1:18281/api/auth/login",
            data=login_body,
            method="POST",
            headers={"Content-Type":"application/json"},
          )
          with urllib.request.urlopen(login_req, timeout=5) as r:
            login = json.loads(r.read().decode("utf-8"))
          token = login.get("accessToken")
          if not token:
            raise RuntimeError("login did not return access token")

          blocked = False
          try:
            create_connection("ws://127.0.0.1:18281/ws?room=jwt-room&tenant=tenant-alpha", timeout=4)
          except WebSocketBadStatusException as e:
            if e.status_code == 401:
              blocked = True
          if not blocked:
            raise RuntimeError("ws without token was not blocked")

          ws = create_connection(
            f"ws://127.0.0.1:18281/ws?room=jwt-room&tenant=tenant-beta&token={token}",
            timeout=5,
          )
          try:
            ws.settimeout(5)
            initial = json.loads(ws.recv())
            if initial.get("tenantId") != "tenant-alpha":
              raise RuntimeError("ws tenant override vulnerability detected")
          finally:
            ws.close()

          chat_body = json.dumps({
            "username":"ci-auth",
            "content":"jwt-auth-ci",
            "roomId":"jwt-room",
            "tenantId":"tenant-beta"
          }).encode("utf-8")
          chat_req = urllib.request.Request(
            "http://127.0.0.1:18281/api/chat/messages",
            data=chat_body,
            method="POST",
            headers={"Content-Type":"application/json", "Authorization": f"Bearer {token}"},
          )
          with urllib.request.urlopen(chat_req, timeout=5) as r:
            created = json.loads(r.read().decode("utf-8"))
          if created.get("tenantId") != "tenant-alpha":
            raise RuntimeError("http tenant override vulnerability detected")
          print("PASS: jwt auth + ws tenant enforcement")
          PY

      - name: Run passkey phase-1 auth flow test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_PASSKEY:-}" ]]; then kill "$PID_PASSKEY" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=memory
          export GIGACHAD_JWT_SECRET=ci_passkey_secret_key
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=
          export GIGACHAD_PASSKEY_STRICT_METADATA=1
          export GIGACHAD_PASSKEY_COUNTER_STRICT=1

          GIGACHAD_SERVER_PORT=18381 ./media_server >passkey_server.log 2>&1 &
          PID_PASSKEY=$!

          python - <<'PY'
          import json
          import time
          import urllib.request
          import urllib.error

          PORT = 18381
          BASE = f"http://127.0.0.1:{PORT}"

          def wait_health(timeout=25):
            end = time.time() + timeout
            while time.time() < end:
              try:
                with urllib.request.urlopen(f"{BASE}/api/health", timeout=2) as r:
                  data = json.loads(r.read().decode("utf-8"))
                if data.get("status") == "healthy":
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError("passkey server health timeout")

          def post(path, payload, headers=None):
            body = json.dumps(payload).encode("utf-8")
            h = {"Content-Type": "application/json"}
            if headers:
              h.update(headers)
            req = urllib.request.Request(f"{BASE}{path}", data=body, method="POST", headers=h)
            with urllib.request.urlopen(req, timeout=5) as r:
              return json.loads(r.read().decode("utf-8"))

          def b64url(data: bytes) -> str:
            import base64
            return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")

          def build_auth_data(rp_id: str, sign_count: int) -> str:
            import hashlib
            rp_hash = hashlib.sha256(rp_id.encode("utf-8")).digest()
            flags = bytes([0x01])  # user present
            counter = int(sign_count).to_bytes(4, byteorder="big", signed=False)
            return b64url(rp_hash + flags + counter)

          def build_signature(credential_key: str, auth_data_b64: str, client_data_json: str) -> str:
            import base64
            import hashlib
            import hmac
            pad = '=' * ((4 - (len(auth_data_b64) % 4)) % 4)
            auth_data = base64.urlsafe_b64decode((auth_data_b64 + pad).encode("ascii"))
            client_hash = hashlib.sha256(client_data_json.encode("utf-8")).digest()
            payload = auth_data + client_hash
            sig = hmac.new(credential_key.encode("utf-8"), payload, hashlib.sha256).digest()
            return b64url(sig)

          def build_signature(credential_key: str, auth_data_b64: str, client_data_json: str) -> str:
            import base64
            import hashlib
            import hmac
            pad = '=' * ((4 - (len(auth_data_b64) % 4)) % 4)
            auth_data = base64.urlsafe_b64decode((auth_data_b64 + pad).encode("ascii"))
            client_hash = hashlib.sha256(client_data_json.encode("utf-8")).digest()
            payload = auth_data + client_hash
            sig = hmac.new(credential_key.encode("utf-8"), payload, hashlib.sha256).digest()
            return b64url(sig)

          def b64url(data: bytes) -> str:
            import base64
            return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")

          def build_auth_data(rp_id: str, sign_count: int) -> str:
            import hashlib
            rp_hash = hashlib.sha256(rp_id.encode("utf-8")).digest()
            flags = bytes([0x01])  # user present
            counter = int(sign_count).to_bytes(4, byteorder="big", signed=False)
            return b64url(rp_hash + flags + counter)

          wait_health()

          username = "ci-passkey"
          tenant = "tenant-ci-passkey"
          credential_id = "ci-cred-1"
          rp_id = "localhost"
          origin = "https://localhost"

          ch_register = post("/api/auth/passkey/challenge", {
            "username": username,
            "flow": "register",
            "role": "moderator",
            "tenantId": tenant,
            "rpId": rp_id,
            "origin": origin
          })
          post("/api/auth/passkey/register", {
            "username": username,
            "challengeId": ch_register["challengeId"],
            "challenge": ch_register["challenge"],
            "credentialId": credential_id,
            "publicKey": "ci-public-key",
            "signCount": 1,
            "rpId": rp_id,
            "origin": origin,
            "clientDataType": "webauthn.create",
            "clientDataJSON": b64url(json.dumps({
              "type": "webauthn.create",
              "challenge": ch_register["challenge"],
              "origin": origin
            }, separators=(",", ":")).encode("utf-8")),
            "authenticatorData": build_auth_data(rp_id, 1)
          })

          ch_login = post("/api/auth/passkey/challenge", {
            "username": username,
            "flow": "login",
            "tenantId": tenant,
            "rpId": rp_id,
            "origin": origin
          })
          login = post("/api/auth/passkey/login", {
            "username": username,
            "challengeId": ch_login["challengeId"],
            "challenge": ch_login["challenge"],
            "credentialId": credential_id,
            "signCount": 2,
            "rpId": rp_id,
            "origin": origin,
            "clientDataType": "webauthn.get",
            "clientDataJSON": b64url(json.dumps({
              "type": "webauthn.get",
              "challenge": ch_login["challenge"],
              "origin": origin
            }, separators=(",", ":")).encode("utf-8")),
            "authenticatorData": build_auth_data(rp_id, 2),
            "signature": build_signature(
              "ci-public-key",
              build_auth_data(rp_id, 2),
              json.dumps({"type": "webauthn.get", "challenge": ch_login["challenge"], "origin": origin}, separators=(",", ":"))
            )
          })
          token = login.get("accessToken", "")
          if not token:
            raise RuntimeError("passkey login did not return access token")
          if login.get("tenantId") != tenant:
            raise RuntimeError("passkey login tenant mismatch")
          if login.get("role") != "moderator":
            raise RuntimeError("passkey login role mismatch")

          created = post("/api/chat/messages", {
            "username": username,
            "content": "ci-passkey-check",
            "roomId": "passkey-room",
            "tenantId": "wrong-tenant"
          }, headers={"Authorization": f"Bearer {token}"})
          if created.get("tenantId") != tenant:
            raise RuntimeError("passkey jwt tenant enforcement failed")

          bad_ch = post("/api/auth/passkey/challenge", {
            "username": username,
            "flow": "login",
            "tenantId": tenant,
            "rpId": rp_id,
            "origin": origin
          })
          bad_client_data = json.dumps({
            "type": "webauthn.get",
            "challenge": bad_ch["challenge"],
            "origin": origin
          }, separators=(",", ":"))
          bad_auth = build_auth_data(rp_id, 3)
          try:
            post("/api/auth/passkey/login", {
              "username": username,
              "challengeId": bad_ch["challengeId"],
              "challenge": bad_ch["challenge"],
              "credentialId": credential_id,
              "signCount": 3,
              "rpId": rp_id,
              "origin": origin,
              "clientDataType": "webauthn.get",
              "clientDataJSON": b64url(bad_client_data.encode("utf-8")),
              "authenticatorData": bad_auth,
              "signature": build_signature("wrong-key", bad_auth, bad_client_data)
            })
            raise RuntimeError("bad signature was not blocked")
          except urllib.error.HTTPError as e:
            if e.code != 401:
              raise

          rollback_ch = post("/api/auth/passkey/challenge", {
            "username": username,
            "flow": "login",
            "tenantId": tenant,
            "rpId": rp_id,
            "origin": origin
          })
          rollback_client_data = json.dumps({
            "type": "webauthn.get",
            "challenge": rollback_ch["challenge"],
            "origin": origin
          }, separators=(",", ":"))
          rollback_auth = build_auth_data(rp_id, 2)
          try:
            post("/api/auth/passkey/login", {
              "username": username,
              "challengeId": rollback_ch["challengeId"],
              "challenge": rollback_ch["challenge"],
              "credentialId": credential_id,
              "signCount": 2,
              "rpId": rp_id,
              "origin": origin,
              "clientDataType": "webauthn.get",
              "clientDataJSON": b64url(rollback_client_data.encode("utf-8")),
              "authenticatorData": rollback_auth,
              "signature": build_signature("ci-public-key", rollback_auth, rollback_client_data)
            })
            raise RuntimeError("signCount rollback was not blocked")
          except urllib.error.HTTPError as e:
            if e.code != 401:
              raise

          try:
            post("/api/auth/passkey/login", {
              "username": username,
              "challengeId": ch_login["challengeId"],
              "challenge": ch_login["challenge"],
              "credentialId": credential_id,
              "signCount": 3,
              "rpId": rp_id,
              "origin": origin,
              "clientDataType": "webauthn.get",
              "clientDataJSON": b64url(json.dumps({
                "type": "webauthn.get",
                "challenge": ch_login["challenge"],
                "origin": origin
              }, separators=(",", ":")).encode("utf-8")),
              "authenticatorData": build_auth_data(rp_id, 3),
              "signature": build_signature(
                "ci-public-key",
                build_auth_data(rp_id, 3),
                json.dumps({"type": "webauthn.get", "challenge": ch_login["challenge"], "origin": origin}, separators=(",", ":"))
              )
            })
            raise RuntimeError("challenge reuse was not blocked")
          except urllib.error.HTTPError as e:
            if e.code != 401:
              raise

          print("PASS: passkey phase-1 auth flow")
          PY

      - name: Run passkey credential persistence test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_PASSKEY_P1:-}" ]]; then kill "$PID_PASSKEY_P1" 2>/dev/null || true; fi
            if [[ -n "${PID_PASSKEY_P2:-}" ]]; then kill "$PID_PASSKEY_P2" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=memory
          export GIGACHAD_JWT_SECRET=ci_passkey_persist_secret
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=
          export GIGACHAD_PASSKEY_STRICT_METADATA=1
          export GIGACHAD_PASSKEY_COUNTER_STRICT=1

          python - <<'PY'
          import json
          import time
          import urllib.request
          import subprocess
          import os
          import signal

          PORT = 18391
          BASE = f"http://127.0.0.1:{PORT}"
          env = os.environ.copy()
          env["GIGACHAD_SERVER_PORT"] = str(PORT)
          env["MEDIA_SERVER_PORT"] = str(PORT)

          def wait_health(timeout=25):
            end = time.time() + timeout
            while time.time() < end:
              try:
                with urllib.request.urlopen(f"{BASE}/api/health", timeout=2) as r:
                  data = json.loads(r.read().decode("utf-8"))
                if data.get("status") == "healthy":
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError("passkey persistence health timeout")

          def post(path, payload, headers=None):
            body = json.dumps(payload).encode("utf-8")
            h = {"Content-Type": "application/json"}
            if headers:
              h.update(headers)
            req = urllib.request.Request(f"{BASE}{path}", data=body, method="POST", headers=h)
            with urllib.request.urlopen(req, timeout=5) as r:
              return json.loads(r.read().decode("utf-8"))

          def b64url(data: bytes) -> str:
            import base64
            return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")

          def build_auth_data(rp_id: str, sign_count: int) -> str:
            import hashlib
            rp_hash = hashlib.sha256(rp_id.encode("utf-8")).digest()
            flags = bytes([0x01])  # user present
            counter = int(sign_count).to_bytes(4, byteorder="big", signed=False)
            return b64url(rp_hash + flags + counter)

          def build_signature(credential_key: str, auth_data_b64: str, client_data_json: str) -> str:
            import base64
            import hashlib
            import hmac
            pad = '=' * ((4 - (len(auth_data_b64) % 4)) % 4)
            auth_data = base64.urlsafe_b64decode((auth_data_b64 + pad).encode("ascii"))
            client_hash = hashlib.sha256(client_data_json.encode("utf-8")).digest()
            payload = auth_data + client_hash
            sig = hmac.new(credential_key.encode("utf-8"), payload, hashlib.sha256).digest()
            return b64url(sig)

          p1 = subprocess.Popen(["./media_server"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL, env=env)
          try:
            wait_health()
            username = "ci-passkey-persist"
            tenant = "tenant-ci-passkey-persist"
            credential_id = "ci-persist-cred-1"
            rp_id = "localhost"
            origin = "https://localhost"

            ch_register = post("/api/auth/passkey/challenge", {
              "username": username,
              "flow": "register",
              "tenantId": tenant,
              "rpId": rp_id,
              "origin": origin
            })
            post("/api/auth/passkey/register", {
              "username": username,
              "challengeId": ch_register["challengeId"],
              "challenge": ch_register["challenge"],
              "credentialId": credential_id,
              "publicKey": "ci-persist-public-key",
              "signCount": 1,
              "rpId": rp_id,
              "origin": origin,
              "clientDataType": "webauthn.create",
              "clientDataJSON": b64url(json.dumps({
                "type": "webauthn.create",
                "challenge": ch_register["challenge"],
                "origin": origin
              }, separators=(",", ":")).encode("utf-8")),
              "authenticatorData": build_auth_data(rp_id, 1)
            })
          finally:
            p1.terminate()
            try:
              p1.wait(timeout=5)
            except Exception:
              p1.kill()

          p2 = subprocess.Popen(["./media_server"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL, env=env)
          try:
            wait_health()
            username = "ci-passkey-persist"
            tenant = "tenant-ci-passkey-persist"
            credential_id = "ci-persist-cred-1"
            rp_id = "localhost"
            origin = "https://localhost"

            ch_login = post("/api/auth/passkey/challenge", {
              "username": username,
              "flow": "login",
              "tenantId": tenant,
              "rpId": rp_id,
              "origin": origin
            })
            login = post("/api/auth/passkey/login", {
              "username": username,
              "challengeId": ch_login["challengeId"],
              "challenge": ch_login["challenge"],
              "credentialId": credential_id,
              "signCount": 2,
              "rpId": rp_id,
              "origin": origin,
              "clientDataType": "webauthn.get",
              "clientDataJSON": b64url(json.dumps({
                "type": "webauthn.get",
                "challenge": ch_login["challenge"],
                "origin": origin
              }, separators=(",", ":")).encode("utf-8")),
              "authenticatorData": build_auth_data(rp_id, 2),
              "signature": build_signature(
                "ci-persist-public-key",
                build_auth_data(rp_id, 2),
                json.dumps({"type": "webauthn.get", "challenge": ch_login["challenge"], "origin": origin}, separators=(",", ":"))
              )
            })
            if not login.get("accessToken"):
              raise RuntimeError("restart sonrası passkey access token yok")
            if login.get("tenantId") != tenant:
              raise RuntimeError("restart sonrası passkey tenant mismatch")
            print("PASS: passkey credential persistence")
          finally:
            p2.terminate()
            try:
              p2.wait(timeout=5)
            except Exception:
              p2.kill()
          PY

      - name: Run passkey rate-limit test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_PASSKEY_RL:-}" ]]; then kill "$PID_PASSKEY_RL" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=memory
          export GIGACHAD_JWT_SECRET=ci_passkey_rate_secret
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=
          export GIGACHAD_PASSKEY_RATE_MAX_ATTEMPTS=2
          export GIGACHAD_PASSKEY_RATE_WINDOW_SEC=60

          GIGACHAD_SERVER_PORT=18401 ./media_server >passkey_rate_server.log 2>&1 &
          PID_PASSKEY_RL=$!

          python - <<'PY'
          import json
          import time
          import urllib.request
          import urllib.error

          PORT = 18401
          BASE = f"http://127.0.0.1:{PORT}"

          def wait_health(timeout=25):
            end = time.time() + timeout
            while time.time() < end:
              try:
                with urllib.request.urlopen(f"{BASE}/api/health", timeout=2) as r:
                  data = json.loads(r.read().decode("utf-8"))
                if data.get("status") == "healthy":
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError("passkey rate-limit health timeout")

          def post(path, payload):
            body = json.dumps(payload).encode("utf-8")
            req = urllib.request.Request(
              f"{BASE}{path}",
              data=body,
              method="POST",
              headers={"Content-Type":"application/json"},
            )
            with urllib.request.urlopen(req, timeout=5) as r:
              return json.loads(r.read().decode("utf-8"))

          wait_health()
          payload = {
            "username": "ci-rl-user",
            "flow": "login",
            "tenantId": "tenant-ci-rl",
            "rpId": "localhost",
            "origin": "https://localhost"
          }
          blocked = False
          for _ in range(20):
            try:
              post("/api/auth/passkey/challenge", payload)
            except urllib.error.HTTPError as e:
              if e.code == 429:
                blocked = True
                break
          if not blocked:
            raise RuntimeError("passkey rate-limit did not return 429 within 20 attempts")
          print("PASS: passkey rate-limit")
          PY

      - name: Run passkey lockout test
        shell: bash
        run: |
          set -euo pipefail
          cleanup() {
            if [[ -n "${PID_PASSKEY_LOCKOUT:-}" ]]; then kill "$PID_PASSKEY_LOCKOUT" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          export GIGACHAD_EVENT_BUS=memory
          export GIGACHAD_JWT_SECRET=ci_passkey_lockout_secret
          export GIGACHAD_API_TOKEN=
          export GIGACHAD_WS_TOKEN=
          export GIGACHAD_PASSKEY_STRICT_METADATA=1
          export GIGACHAD_PASSKEY_COUNTER_STRICT=1
          export GIGACHAD_PASSKEY_LOCKOUT_SEC=120
          export GIGACHAD_PASSKEY_RATE_MAX_ATTEMPTS=30
          export GIGACHAD_PASSKEY_RATE_WINDOW_SEC=60

          GIGACHAD_SERVER_PORT=18411 ./media_server >passkey_lockout_server.log 2>&1 &
          PID_PASSKEY_LOCKOUT=$!

          python - <<'PY'
          import json
          import time
          import urllib.request
          import urllib.error
          import base64
          import hashlib
          import hmac

          PORT = 18411
          BASE = f"http://127.0.0.1:{PORT}"

          def b64url(data: bytes) -> str:
            return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")

          def build_auth_data(rp_id: str, sign_count: int) -> str:
            rp_hash = hashlib.sha256(rp_id.encode("utf-8")).digest()
            flags = bytes([0x01])
            counter = int(sign_count).to_bytes(4, byteorder="big", signed=False)
            return b64url(rp_hash + flags + counter)

          def build_signature(credential_key: str, auth_data_b64: str, client_data_json: str) -> str:
            pad = '=' * ((4 - (len(auth_data_b64) % 4)) % 4)
            auth_data = base64.urlsafe_b64decode((auth_data_b64 + pad).encode("ascii"))
            client_hash = hashlib.sha256(client_data_json.encode("utf-8")).digest()
            payload = auth_data + client_hash
            return b64url(hmac.new(credential_key.encode("utf-8"), payload, hashlib.sha256).digest())

          def wait_health(timeout=25):
            end = time.time() + timeout
            while time.time() < end:
              try:
                with urllib.request.urlopen(f"{BASE}/api/health", timeout=2) as r:
                  data = json.loads(r.read().decode("utf-8"))
                if data.get("status") == "healthy":
                  return
              except Exception:
                pass
              time.sleep(0.5)
            raise RuntimeError("passkey lockout health timeout")

          def post(path, payload):
            body = json.dumps(payload).encode("utf-8")
            req = urllib.request.Request(
              f"{BASE}{path}",
              data=body,
              method="POST",
              headers={"Content-Type":"application/json"},
            )
            with urllib.request.urlopen(req, timeout=5) as r:
              return json.loads(r.read().decode("utf-8"))

          wait_health()
          username = f"ci-lockout-{int(time.time()*1000)}"
          tenant = "tenant-ci-lockout"
          credential_id = "ci-lockout-cred"
          rp_id = "localhost"
          origin = "https://localhost"
          pub = "ci-lockout-pub"

          ch_reg = post("/api/auth/passkey/challenge", {"username":username,"flow":"register","tenantId":tenant,"rpId":rp_id,"origin":origin})
          reg_client = json.dumps({"type":"webauthn.create","challenge":ch_reg["challenge"],"origin":origin}, separators=(",", ":"))
          post("/api/auth/passkey/register", {
            "username": username,
            "challengeId": ch_reg["challengeId"],
            "challenge": ch_reg["challenge"],
            "credentialId": credential_id,
            "publicKey": pub,
            "signCount": 1,
            "rpId": rp_id,
            "origin": origin,
            "clientDataType": "webauthn.create",
            "clientDataJSON": b64url(reg_client.encode("utf-8")),
            "authenticatorData": build_auth_data(rp_id, 1),
          })

          lock_triggered = False
          for sc in range(2, 15):
            ch = post("/api/auth/passkey/challenge", {"username":username,"flow":"login","tenantId":tenant,"rpId":rp_id,"origin":origin})
            cjson = json.dumps({"type":"webauthn.get","challenge":ch["challenge"],"origin":origin}, separators=(",", ":"))
            auth = build_auth_data(rp_id, sc)
            bad = {
              "username": username,
              "challengeId": ch["challengeId"],
              "challenge": ch["challenge"],
              "credentialId": credential_id,
              "signCount": sc,
              "rpId": rp_id,
              "origin": origin,
              "clientDataType": "webauthn.get",
              "clientDataJSON": b64url(cjson.encode("utf-8")),
              "authenticatorData": auth,
              "signature": build_signature("wrong-key", auth, cjson),
            }
            try:
              post("/api/auth/passkey/login", bad)
              raise RuntimeError("expected bad signature failure")
            except urllib.error.HTTPError as e:
              if e.code == 429:
                lock_triggered = True
                break
              if e.code != 401:
                raise

          if not lock_triggered:
            raise RuntimeError("lockout was not triggered in bad signature loop")

          ch_ok = post("/api/auth/passkey/challenge", {"username":username,"flow":"login","tenantId":tenant,"rpId":rp_id,"origin":origin})
          ok_cjson = json.dumps({"type":"webauthn.get","challenge":ch_ok["challenge"],"origin":origin}, separators=(",", ":"))
          ok_auth = build_auth_data(rp_id, 20)
          ok = {
            "username": username,
            "challengeId": ch_ok["challengeId"],
            "challenge": ch_ok["challenge"],
            "credentialId": credential_id,
            "signCount": 4,
            "rpId": rp_id,
            "origin": origin,
            "clientDataType": "webauthn.get",
            "clientDataJSON": b64url(ok_cjson.encode("utf-8")),
            "authenticatorData": ok_auth,
            "signature": build_signature(pub, ok_auth, ok_cjson),
          }
          try:
            post("/api/auth/passkey/login", ok)
            raise RuntimeError("expected lockout block")
          except urllib.error.HTTPError as e:
            if e.code != 429:
              raise
          print("PASS: passkey lockout")
          PY

